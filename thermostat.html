<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,height=device-height,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>WXWI Thermostat (TV)</title>
  <style>
    :root{ --fg: rgba(210,230,240,.55); --bg:#050711; }
    html,body{margin:0;height:100%;background:var(--bg);overflow:hidden}
    body{display:grid;place-items:center}
    img{width:100vw;height:100vh;object-fit:contain;image-rendering:auto;background:var(--bg)}
    .hint{
      position:fixed;left:12px;bottom:10px;
      color:var(--fg);
      font: 700 12px/1.2 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      letter-spacing:.14em;
      text-transform:uppercase;
      user-select:none;
      pointer-events:none;
      text-shadow:0 0 18px rgba(62,246,255,.12);
      white-space:nowrap;
    }
    .hint b{ color: rgba(230,240,255,.8); }
    .hint .bad{ color: rgba(255,170,170,.92); }
  </style>
</head>
<body>
  <img id="img" alt="WXWI Thermostat" />
  <div id="hint" class="hint">THERMOSTAT • LOADING…</div>

  <script>
    const img = document.getElementById("img");
    const hint = document.getElementById("hint");

    const ASSETS = {
      "1080p": { webp: "assets/render/wxwi-thermostat-1080p.webp", png: "assets/render/wxwi-thermostat-1080p.png" },
      "4k":    { webp: "assets/render/wxwi-thermostat-4k.webp",    png: "assets/render/wxwi-thermostat-4k.png" },
    };
    const STATUS_URL = "assets/render/wxwi-thermostat.status.json";
    const POLL_MS = 10_000;

    const pick = () => (window.innerWidth * (window.devicePixelRatio||1) >= 2560 ? "4k" : "1080p");
    const withV = (base, v) => base + "?v=" + encodeURIComponent(String(v));

    const fetchNoStore = async (url) => {
      const res = await fetch(url, { cache:"no-store", headers:{ "Cache-Control":"no-cache", "Pragma":"no-cache" }});
      if (!res.ok) throw new Error("HTTP " + res.status);
      return await res.json();
    };

    let lastRenderedAt = null;

    async function swapTo(v){
      const res = pick();
      const webp = withV(ASSETS[res].webp, v);
      const png = withV(ASSETS[res].png, v);

      const ok = await new Promise((resolve)=>{
        const probe = new Image();
        probe.onload = ()=>resolve(true);
        probe.onerror = ()=>resolve(false);
        probe.src = webp;
      });
      img.src = ok ? webp : png;
    }

    async function poll(){
      try{
        const s = await fetchNoStore(STATUS_URL + "?cb=" + Date.now());
        const renderedAt = s && s.renderedAt ? String(s.renderedAt) : null;
        const changed = !lastRenderedAt || (renderedAt && renderedAt !== lastRenderedAt);
        if (renderedAt) lastRenderedAt = renderedAt;

        const d = renderedAt ? new Date(renderedAt) : null;
        const mins = d && !isNaN(d.getTime()) ? Math.floor((Date.now()-d.getTime())/60000) : null;
        const stale = (mins != null && mins >= 20);

        hint.innerHTML = "THERMOSTAT • RENDER " + (mins==null ? "—" : (stale ? "<b class='bad'>"+mins+"m</b>" : "<b>"+mins+"m</b>"));

        if (changed) await swapTo(renderedAt || Date.now());
      }catch(e){
        hint.innerHTML = "THERMOSTAT • <b class='bad'>STATUS UNAVAILABLE</b>";
        await swapTo(Date.now());
      }
    }

    poll();
    setInterval(poll, POLL_MS);
    window.addEventListener("resize", () => { clearTimeout(window.__rz); window.__rz=setTimeout(()=>swapTo(lastRenderedAt||Date.now()), 300); });
  </script>
</body>
</html>
