<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,height=device-height,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>TV Infographic</title>
  <style>
    html,body{ margin:0; height:100%; background:#000; }
    img{ width:100vw; height:100vh; object-fit:contain; display:block; }
  </style>
</head>
<body>
  <picture>
    <source id="src4k" srcset="assets/render/wxwi-dashboard-4k.webp" type="image/webp">
    <img id="img" src="assets/render/wxwi-dashboard-1080p.webp" alt="WXWI TV Infographic">
  </picture>

  <script>
    const src4k = document.getElementById('src4k');
    const img = document.getElementById('img');
    const base4k = src4k.getAttribute('srcset');
    const base1080 = img.getAttribute('src');
    function bust(){
      const t = Date.now();
      src4k.setAttribute('srcset', base4k + '?t=' + t);
      img.setAttribute('src', base1080 + '?t=' + t);
    }
    bust();
    setInterval(bust, 60_000);
  </script>
</body>
</html>
