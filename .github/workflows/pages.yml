name: pages

on:
  push:
    branches: [ main ]
  # IMPORTANT:
  # Commits made by GitHub Actions using GITHUB_TOKEN do not reliably trigger
  # other workflows via "push" (to prevent infinite loops). Our dataset/render
  # workflows commit updates; therefore Pages must also be triggered via
  # workflow_run and/or schedule to ensure the site actually redeploys.
  workflow_run:
    workflows:
      - Update METAR/TAF Dataset (fast)
      - Force Dataset Refresh (30m, fast)
      - Render TV Assets (infographic + thermostat)
    types:
      - completed
  schedule:
    - cron: "*/10 * * * *"  # safety net: redeploy at least every 10 minutes
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Always deploy the latest default-branch state.
          # workflow_run events can reference the pre-commit SHA of the triggering run.
          ref: main

      - name: Prepare dist
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist

          # Core pages
          cp -f index.html dist/

          # Optional pages (copy if exist)
          for f in alerts.html map.html tv.html thermostat.html; do
            if [ -f "$f" ]; then cp -f "$f" dist/; fi
          done

          # Static folders (copy if exist)
          for d in assets data render scripts stat css js; do
            if [ -d "$d" ]; then cp -R "$d" dist/; fi
          done

          # Plain text configs (copy if exist)
          for f in base.txt; do
            if [ -f "$f" ]; then cp -f "$f" dist/; fi
          done

          # Safety: never publish node_modules
          rm -rf dist/node_modules || true

          echo "== Dist tree (top 3 levels) =="
          find dist -maxdepth 3 -type f | sort | sed -n '1,220p'

      # IMPORTANT: upload exactly ONE Pages artifact with a UNIQUE name
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: pages-dist
          path: dist

  deploy:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: pages-dist
