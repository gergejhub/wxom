name: Update METAR/TAF Dataset (fast)

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dataset
  # IMPORTANT:
  # This workflow is scheduled at the minimum interval (5 min).
  # If a run takes longer than the schedule interval and we cancel in-progress runs,
  # the workflow can get into a state where it never finishes and never commits new data.
  # Keep the currently-running job alive; GitHub will cancel any older *pending* run.
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Data refresh must be quick and reliable (every 5 min).
      # Rendering assets via puppeteer is moved to a separate workflow (render.yml)
      # so that dataset refresh keeps working even if rendering is slow or fails.
      - name: Update data
        run: node scripts/update-data.mjs

      - name: Generate Thermostat data
        run: node scripts/generate-thermostat.mjs

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add data/thermostat.json
            git add data/latest.json data/status.json data/runways.json data/iata_map.json data/schema_debug.json data/management_brief.json data/changes.json
            git commit -m "Update dataset + thermostat"
            git push
          else
            echo "No changes to commit."
          fi