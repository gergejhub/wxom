name: Render TV Assets (infographic + thermostat)

on:
  # Main trigger: render right after the data update workflow finishes.
  # (Pushes created by github-actions via GITHUB_TOKEN do not reliably trigger other workflows.)
  workflow_run:
    workflows: ["Update METAR/TAF Dataset (fast)"]
    types: [completed]

  # Fallback schedule (in case workflow_run is paused by GitHub on inactive repos)
  schedule:
    - cron: "*/30 * * * *"

  workflow_dispatch:

permissions:

  contents: write

concurrency:
  group: render-assets
  cancel-in-progress: false

env:
  # IMPORTANT: puppeteer does NOT expand "~" in env vars.
  # It must be an absolute path, otherwise install fails with:
  # "Target directory is expected to be absolute".
  PUPPETEER_CACHE_DIR: ${{ github.workspace }}/.cache/puppeteer

jobs:
  render:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Prepare puppeteer cache dir
        run: mkdir -p "${{ env.PUPPETEER_CACHE_DIR }}"

      # Speed-ups: cache npm + puppeteer browser downloads.
      - name: Restore npm cache
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Restore puppeteer cache
        uses: actions/cache@v4
        with:
          path: ${{ env.PUPPETEER_CACHE_DIR }}
          key: ${{ runner.os }}-puppeteer-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-puppeteer-

      - name: Install deps (puppeteer)
        # Avoid generating an untracked package-lock.json in CI.
        run: npm install --no-audit --no-fund --no-package-lock

      - name: Render TV infographic (4K + 1080p)
        run: node scripts/render-infographic.mjs

      - name: Render Thermostat (4K + 1080p)
        run: node scripts/render-thermostat.mjs

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Only consider render outputs. Other untracked/modified files (e.g. caches)
          # must not make the workflow fail.
          git add assets/render/wxwi-dashboard-4k.webp assets/render/wxwi-dashboard-1080p.webp \
                 assets/render/wxwi-dashboard-4k.png assets/render/wxwi-dashboard-1080p.png \
                 assets/render/wxwi-dashboard.status.json || true
          git add assets/render/wxwi-thermostat-4k.webp assets/render/wxwi-thermostat-1080p.webp \
                 assets/render/wxwi-thermostat-4k.png assets/render/wxwi-thermostat-1080p.png \
                 assets/render/wxwi-thermostat.status.json || true

          if git diff --cached --quiet; then
            echo "No render changes to commit."
            exit 0
          fi

          git commit -m "Render TV assets"
          git push
